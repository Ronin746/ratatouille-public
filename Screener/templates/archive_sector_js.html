<script>
// ── Sort helpers ──────────────────────────────────────────────────────────
function sortSectors(key, btn) {
  var sortKey = key;
  if (key === 'score' && _sectorMode === 'short') sortKey = 'shortscore';
  var grid = document.getElementById('secGrid');
  grid.querySelectorAll('.sec-stage-hdr').forEach(function(h) { h.remove(); });
  var cards = Array.from(grid.querySelectorAll('.sec-card'));
  cards.sort(function(a, b) {
    return parseFloat(b.dataset[sortKey]) - parseFloat(a.dataset[sortKey]);
  });
  cards.forEach(function(c) { grid.appendChild(c); });
  document.querySelectorAll('.sc-sort-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
}

function sortByStage(btn) {
  var isShort = (_sectorMode === 'short');
  var STAGE_ORDER = ['LEADING','FADING','BUILDING','SLIPPING','HOLDING','RECOVERY','WEAK','BEARISH'];
  var STAGE_COLORS = {
    'LEADING':'#00d4aa','FADING':'#4a9eff','BUILDING':'#4a9eff',
    'SLIPPING':'#f5a623','HOLDING':'#f5a623','RECOVERY':'#f5a623',
    'WEAK':'#ff4a6a','BEARISH':'#ff4a6a'
  };
  var grid = document.getElementById('secGrid');
  grid.querySelectorAll('.sec-stage-hdr').forEach(function(h) { h.remove(); });
  var cards = Array.from(grid.querySelectorAll('.sec-card'));
  var groups = {};
  STAGE_ORDER.forEach(function(s) { groups[s] = []; });
  cards.forEach(function(c) {
    var stage = isShort ? (c.dataset.shortstage || 'WEAK') : (c.dataset.stage || 'WEAK');
    if (!groups[stage]) groups[stage] = [];
    groups[stage].push(c);
  });
  STAGE_ORDER.forEach(function(s) {
    groups[s].sort(function(a,b) {
      var aScore = isShort ? parseFloat(a.dataset.shortscore||0) : parseFloat(a.dataset.score||0);
      var bScore = isShort ? parseFloat(b.dataset.shortscore||0) : parseFloat(b.dataset.score||0);
      return bScore - aScore;
    });
  });
  STAGE_ORDER.forEach(function(s) {
    if (groups[s].length === 0) return;
    var hdr = document.createElement('div');
    hdr.className = 'sec-stage-hdr';
    hdr.style.color = STAGE_COLORS[s] || '#888';
    hdr.textContent = s + '  (' + groups[s].length + ')';
    grid.appendChild(hdr);
    groups[s].forEach(function(c) { grid.appendChild(c); });
  });
  if (btn) {
    document.querySelectorAll('.sc-sort-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
  }
}

// ── Long / Short mode toggle ──────────────────────────────────────────────
var _sectorMode = 'long';  // 'long' | 'short'

function _scoreColor(v) {
  return v >= 70 ? '#00d4aa' : v >= 55 ? '#4a9eff' : v >= 40 ? '#f5a623' : '#ff4a6a';
}

function setSectorMode(mode, btn) {
  _sectorMode = mode;
  var isShort = (mode === 'short');
  document.querySelectorAll('.sc-ls-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');

  // Update each card's score, stage badge, border color
  document.querySelectorAll('.sec-card').forEach(function(card) {
    var scoreEl = card.querySelector('.sec-score');
    var stageEl = card.querySelector('.sec-sig');
    var scoreVal, stageLabel, stageColor;
    if (isShort) {
      scoreVal   = parseFloat(card.dataset.shortscore) || 0;
      stageLabel = card.dataset.shortstage || 'WEAK';
      stageColor = card.dataset.shortstagecolor || '#ff4a6a';
    } else {
      scoreVal   = parseFloat(card.dataset.score) || 0;
      stageLabel = card.dataset.stage || 'WEAK';
      stageColor = card.dataset.stagecolor || '#888888';
    }
    if (scoreEl) {
      scoreEl.textContent = scoreVal.toFixed(1);
      scoreEl.style.color = _scoreColor(scoreVal);
    }
    if (stageEl) {
      stageEl.textContent = stageLabel;
      stageEl.style.color = stageColor;
      var r = parseInt(stageColor.slice(1,3),16);
      var g = parseInt(stageColor.slice(3,5),16);
      var b = parseInt(stageColor.slice(5,7),16);
      stageEl.style.background = 'rgba('+r+','+g+','+b+',0.14)';
    }
    card.style.borderLeftColor = stageColor;
  });

  // Re-sort by stage in the new mode (no btn = don't change active sort button)
  sortByStage(null);

  // If a panel is open, refresh it for the new mode
  if (_selCard) { renderSectorPanel(_selCard); }
}

// ── Top-10 panel ─────────────────────────────────────────────────────────
var _selCard = null;

function renderSectorPanel(card) {
  var isShort = (_sectorMode === 'short');
  var raw     = isShort ? (card.dataset.top10short || '[]') : (card.dataset.top10 || '[]');
  var stocks  = [];
  try { stocks = JSON.parse(raw); } catch(e) {}

  var name = (card.querySelector('.sec-name').title || card.querySelector('.sec-name').textContent).trim();
  var modeLabel = isShort ? ' \u2014 Top 10 Short' : ' \u2014 Top 10';
  document.getElementById('secPanelTitle').textContent = name + modeLabel;

  var scoreHdr = isShort ? 'Short Score' : 'Score';
  if (stocks.length === 0) {
    document.getElementById('secPanelTable').innerHTML = '<p style="color:var(--text-muted);font-size:.65rem;padding:6px 0">No data available.</p>';
  } else {
    var rows = stocks.map(function(s) {
      var d1s  = (s.d1  > 0 ? '+' : '') + s.d1  + '%';
      var d7s  = (s.d7  > 0 ? '+' : '') + s.d7  + '%';
      var d30s = (s.d30 > 0 ? '+' : '') + s.d30 + '%';
      var c1   = s.d1  > 0 ? '#00d4aa' : (s.d1  < 0 ? '#ff4a6a' : '#808090');
      var c7   = s.d7  > 0 ? '#00d4aa' : (s.d7  < 0 ? '#ff4a6a' : '#808090');
      var c30  = s.d30 > 0 ? '#00d4aa' : (s.d30 < 0 ? '#ff4a6a' : '#808090');
      return '<tr>'
        + '<td>' + s.t  + '</td>'
        + '<td>' + s.s  + '</td>'
        + '<td>' + s.r2 + '</td>'
        + '<td style="color:' + c1  + '">' + d1s  + '</td>'
        + '<td style="color:' + c7  + '">' + d7s  + '</td>'
        + '<td style="color:' + c30 + '">' + d30s + '</td>'
        + '</tr>';
    }).join('');
    document.getElementById('secPanelTable').innerHTML =
      '<table class="sec-panel-table"><thead><tr>'
      + '<th>Ticker</th><th>' + scoreHdr + '</th><th>R\u00B2</th>'
      + '<th>Chg 1D%</th><th>Chg 1W%</th><th>Chg 1M%</th>'
      + '</tr></thead><tbody>' + rows + '</tbody></table>';
  }
  document.getElementById('secPanelArea').style.display = 'block';
}

function openSectorPanel(card) {
  if (_selCard === card) { closeSectorPanel(); return; }
  if (_selCard) _selCard.classList.remove('sec-selected');
  _selCard = card;
  card.classList.add('sec-selected');
  renderSectorPanel(card);
  document.getElementById('secPanelArea').style.display = 'block';
  document.getElementById('secPanelArea').scrollIntoView({behavior:'smooth', block:'nearest'});
}

function closeSectorPanel() {
  if (_selCard) _selCard.classList.remove('sec-selected');
  _selCard = null;
  document.getElementById('secPanelArea').style.display = 'none';
}

// ── Watchlist download (LEADING + BUILDING sectors, top-10 each) ──────────
function downloadLeadingWatchlist() {
  var TARGET_STAGES = {'LEADING': true, 'BUILDING': true};
  var cards = Array.from(document.querySelectorAll('#secGrid .sec-card'));
  var seen = {};
  var rows = [];
  var today = new Date().toISOString().slice(0,10);

  // header
  rows.push('Ticker,Sector,Stage,Score,R2,Chg1D%,Chg1W%,Chg1M%');

  cards.forEach(function(card) {
    var stage = card.dataset.stage || '';
    if (!TARGET_STAGES[stage]) return;
    var sectorName = (card.querySelector('.sec-name').title || card.querySelector('.sec-name').textContent).trim();
    var stocks = [];
    try { stocks = JSON.parse(card.dataset.top10 || '[]'); } catch(e) {}
    stocks.forEach(function(s) {
      if (seen[s.t]) return;
      seen[s.t] = true;
      rows.push([
        s.t,
        '"' + sectorName.replace(/"/g, '""') + '"',
        stage,
        s.s,
        s.r2,
        s.d1,
        s.d7,
        s.d30
      ].join(','));
    });
  });

  // Append long candidates (Final_Score >= 75) not already included above
  var candEl = document.getElementById('candidatesData');
  if (candEl) {
    var candidates = [];
    try { candidates = JSON.parse(candEl.textContent || '[]'); } catch(e) {}
    candidates.forEach(function(c) {
      if (seen[c.t]) return;
      seen[c.t] = true;
      rows.push([
        c.t,
        '"' + (c.sector || '').replace(/"/g, '""') + '"',
        'CANDIDATE',
        c.s,
        c.r2,
        c.d1,
        c.d7,
        c.d30
      ].join(','));
    });
  }

  if (rows.length <= 1) {
    alert('No LEADING/BUILDING sectors or candidates found.');
    return;
  }

  var n = rows.length - 1;
  var csv = rows.join('\r\n');
  var blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href     = url;
  a.download = 'watchlist_' + today + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  console.log('Watchlist downloaded: ' + n + ' tickers');
}
</script>
